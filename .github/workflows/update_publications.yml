name: Update Publications

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:


# Prevent multiple ADS updates running at the same time
concurrency:
  group: ads-publications-update
  cancel-in-progress: false


permissions:
  contents: write


jobs:

  update-publications:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install requests pyyaml


      - name: Run ADS updater
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
          ORCID_ID: ${{ secrets.ORCID_ID }}

        run: |
          python scripts/update_ads.py


      - name: Commit updated publications
        run: |

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Ensure we are working on latest main
          git pull --rebase origin main

          git add data/publications.json

          git diff --cached --quiet || \
          git commit -m "Automatic publication update"

          git push
