name: Deploy Hugo Website

on:
  push:
    branches:
      - main

  workflow_dispatch:


# Prevent overlapping Hugo deployments
concurrency:
  group: hugo-deployment
  cancel-in-progress: true


permissions:
  contents: read
  pages: write
  id-token: write


jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout latest repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive


      - name: Ensure latest main branch
        run: |
          git pull origin main


      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true


      - name: Build Hugo website
        run: |
          hugo --minify


      - name: Upload Hugo artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public



  deploy:

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}


    steps:

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
